  四、CompletenessBar 计算算法

  总分 = 100 分，按权重分配：

  基础信息（20分）
    - name             存在 → 5分
    - city             存在 → 5分
    - nines.length > 0 → 5分
    - tee_sets.length > 0 → 5分

  洞数据完整度（60分）
    - 每个 nine 的每个 hole：
      par_score = 所有洞都有 par ? 1 : (有 par 的洞数 / 总洞数)
      yards_score = 所有洞至少一套 tee 有 yards ? 1 : (有 yards 的洞数 / 总洞数)
    - holes_completeness = avg(par_score, yards_score) across all nines
    - 洞数据分 = holes_completeness × 60

  Layouts（10分）
    - layouts.length > 0 → 10分

  元数据（10分）
    - phone 存在 → 3分
    - website 存在 → 3分
    - geo 存在 → 4分

  最终百分比 = (基础 + 洞数据 + Layouts + 元数据) / 100

  颜色映射：
    0-30%   → red    (#ef4444)
    31-60%  → orange (#f97316)
    61-85%  → yellow (#eab308)
    86-100% → green  (#22c55e)

