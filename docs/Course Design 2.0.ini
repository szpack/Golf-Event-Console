⏺ Courses 模块设计文档（修正版）

  一、信息架构

  Courses (#/courses)
  ├── Course List (默认视图)
  │   ├── 搜索栏 + 筛选（城市/状态/来源）
  │   ├── 表格列：Name | City | Holes | Layouts | Status | Source | Updated
  │   └── 操作：+ New Course / Import
  ├── Course Detail (#/courses/:id)
  │   ├── Header（名称 / 城市 / 状态徽标 / CompletenessBar）
  │   ├── Tab: Overview | Structure | Tees | Metadata | History
  │   └── Actions: Edit / Archive / Export
  ├── Course Structure Editor (#/courses/:id/structure)
  │   └── 3-Column Layout: Tree | Grid | Properties
  ├── Course Review (#/courses/:id/review)
  │   └── Split View: Left=Current | Right=Incoming | Bottom=Actions
  ├── Import Wizard (#/courses/import)
  │   ├── Step 1: Upload / Paste
  │   ├── Step 2: Parse Preview
  │   ├── Step 3: Diff（Match/Create/Link to alias）
  │   └── Step 4: Confirm
  └── Archived (#/courses/archived)
      ├── 筛选：closed / archived / merged / duplicate_hidden
      └── 操作：Restore / Permanently Delete（需引用检查）

