重新设计并实现 New Round（创建新球局）功能。

目标是让 开局流程极简、稳定、可扩展，并支持 预约队列。

一、产品蓝图

核心数据结构分为三层：

1 Round（球局）

球局是核心容器，负责记录：

球场

球员

洞

成绩

shot

Round 不包含任何玩法逻辑。

2 Play（玩法）

玩法是独立模块：

例如：

挂杆

挂洞

8421

拉斯

最近旗奖

Play 挂载在 Round 之上。

New Round 不会创建任何玩法实例。

3 UI / Overlay

UI 层负责：

计分

展示

导出

添加玩法

二、设计原则

New Round 必须满足：

1 极轻量

创建球局只需要：

球场

球员

开球时间

2 不弹窗

New Round 不使用 modal / popup。

必须在 右侧操作区（Right Panel）完成。

3 两步即可开局

流程：

选择球场
选择球员
创建球局
4 默认值必须智能

如果用户不填写：

title 自动生成

teeTime 默认当前时间

洞数根据 routing

5 支持预约球局

如果开球时间 不是当天：

自动进入 预约队列。

三、New Round 用户流程

流程如下：

NEW
  ↓
选择球场 / Routing
  ↓
选择球员
  ↓
开球时间（默认当前）
  ↓
创建球局
  ↓
系统判断 teeTime
     ├─ 当天 → 直接进入球局
     └─ 非当天 → 加入预约队列
四、右侧操作区 UI

New Round 在右侧面板完成。

不要弹出窗口。

结构：

RIGHT PANEL

NEW ROUND
────────────────

Course
[ 最近球场 ]
[ 搜索球场 ]

Routing
[A-B ▼]

Players
[ + Pack ]
[ + Mark ]
[ + Free ]
[ + Guest ]

Selected Players
1 Pack
2 Mark
3 Free

Tee Time
[ 2026-03-09 08:00 ]

[ CREATE ROUND ]
五、创建逻辑

创建按钮点击后执行：

createRound(input)

流程：

1 validate input
2 generate roundId
3 build courseSnapshot
4 build playersSnapshot
5 initialize holes[]
6 resolve initial status
7 write rounds
8 write roundData
9 update activeRoundId
六、teeTime 判断规则

函数：

resolveRoundInitialStatus()

规则：

未填写 teeTime
status = in_progress
activate = true
teeTime 是当天
status = in_progress
activate = true
teeTime 非当天
status = scheduled
activate = false
七、Round 状态

Round 必须支持以下状态：

scheduled
in_progress
finished
abandoned
archived
八、Round 数据结构

rounds：

{
  id: string
  title: string
  status: 'scheduled' | 'in_progress' | 'finished' | 'abandoned' | 'archived'
  createdAt: string
  updatedAt: string
  teeTime: string
  courseId: string
  routingId: string
  playerIds: string[]
  playerCount: number
  holesPlanned: number
  holesCompleted: number
}
九、RoundData 结构
{
  meta: {
    roundId
    schemaVersion
  },

  courseSnapshot: {},
  players: [],
  holes: [],
  derived: {},
  exports: {},
  sync: {}
}
十、初始化 holes

根据 routing 生成：

holes = [
  {
    holeNo
    par
    hcpIndex
    distanceYd
    state: 'empty'

    players: {
      playerId: {
        score: {
          gross: null
          net: null
          status: 'empty'
        }

        shots: []
      }
    }
  }
]
十一、预约队列

预约局只需要：

status = scheduled

UI 层会自动把它归类到：

Scheduled Rounds

不需要单独数据库结构。

十二、activeRoundId

如果：

status = in_progress

则：

activeRoundId = newRoundId

并进入记分界面。

十三、自动标题

如果 title 未填写：

自动生成：

{courseName} {routingName} · {date}

例如：

沙河 A-B · 3月9日
十四、代码要求

请实现以下函数：

createRound(input)
buildCourseSnapshot()
buildPlayersSnapshot()
initializeHoles()
resolveRoundInitialStatus()
十五、重要约束

New Round 不得创建 Play。

Play 只能在 Round 内部后续创建。

十六、代码风格

要求：

函数职责单一

不污染旧逻辑

不破坏现有 score / hole / shot 数据结构

保持向后兼容

十七、输出

实现：

1 Right Panel UI
2 createRound() 服务
3 Round 初始化逻辑
4 Scheduled Round 支持
