    │
    ▼
  Service 层
    ├── authService    register / login / logout 业务逻辑
    ├── tokenService   sign / verify / refresh（JWT + session 表）
    └── userService    getMe / updateMe / getDefaultPlayer / updatePlayer
    │
    ▼
  Prisma Client → PostgreSQL

  路由清单

  ┌────────┬────────────────────────────┬──────┬───────────────────────────────────────────────────┐
  │ Method │            Path            │ Auth │                       说明                        │
  ├────────┼────────────────────────────┼──────┼───────────────────────────────────────────────────┤
  │ POST   │ /api/v1/auth/register      │ No   │ 注册 → 建 user + auth_identity + player + session │
  ├────────┼────────────────────────────┼──────┼───────────────────────────────────────────────────┤
  │ POST   │ /api/v1/auth/login         │ No   │ 登录 → 校验密码 → 签发 token                      │
  ├────────┼────────────────────────────┼──────┼───────────────────────────────────────────────────┤
  │ POST   │ /api/v1/auth/logout        │ Yes  │ 吊销当前 session                                  │
  ├────────┼────────────────────────────┼──────┼───────────────────────────────────────────────────┤
  │ POST   │ /api/v1/auth/refresh       │ No   │ refresh_token → 新 access_token                   │
  ├────────┼────────────────────────────┼──────┼───────────────────────────────────────────────────┤
  │ GET    │ /api/v1/me                 │ Yes  │ 返回 user + default_player + providers 摘要       │
  ├────────┼────────────────────────────┼──────┼───────────────────────────────────────────────────┤
  │ PATCH  │ /api/v1/me                 │ Yes  │ 改 user.displayName                               │
  ├────────┼────────────────────────────┼──────┼───────────────────────────────────────────────────┤
  │ GET    │ /api/v1/players/me/default │ Yes  │ 返回默认 player                                   │
  ├────────┼────────────────────────────┼──────┼───────────────────────────────────────────────────┤
  │ PATCH  │ /api/v1/players/me/default │ Yes  │ 改 player.displayName / handicap                  │
  └────────┴────────────────────────────┴──────┴───────────────────────────────────────────────────┘

  Token 策略

  - access_token: JWT，15 分钟过期，payload = { userId, sessionId }
  - refresh_token: 随机 UUID，存 hash 到 sessions 表，7 天过期
  - 前端存 localStorage：golf_access_token / golf_refresh_token
  - apiClient.js 拦截 401 → 自动 refresh → 重试原请求

