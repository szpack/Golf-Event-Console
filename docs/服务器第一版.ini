  启动流程改动（shell.js init）

  Shell.init()
    → authState.init()        // 新增
        → 读 localStorage token
        → 有 token → fetch /me
            → 成功 → authState.user / authState.player 就绪
            → 失败 → 清 token，游客模式
        → 无 token → 游客模式
    → 渲染 sidebar 登录态
    → Router.start()           // 不变

  关键：authState.init() 失败 不阻塞 后续流程，游客模式照常运行。

