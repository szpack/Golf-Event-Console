  2. Schema 设计

  用 Prisma schema 表达：

  datasource db {
    provider = "postgresql"
    url      = env("DATABASE_URL")
  }

  generator client {
    provider = "prisma-client-js"
  }

  model User {
    id          String   @id @default(uuid()) @db.Uuid
    email       String?  @unique
    displayName String   @map("display_name")
    status      String   @default("active")    // active | suspended | deleted
    createdAt   DateTime @default(now()) @map("created_at")
    updatedAt   DateTime @updatedAt @map("updated_at")

    authIdentities AuthIdentity[]
    players        Player[]
    sessions       Session[]

    @@map("users")
  }

  model AuthIdentity {
    id           String    @id @default(uuid()) @db.Uuid
    userId       String    @map("user_id") @db.Uuid
    provider     String                          // password | phone | wechat | apple | google
    providerUid  String?   @map("provider_uid")
    passwordHash String?   @map("password_hash")
    phoneE164    String?   @map("phone_e164")
    email        String?
    isPrimary    Boolean   @default(false) @map("is_primary")
    verifiedAt   DateTime? @map("verified_at")
    createdAt    DateTime  @default(now()) @map("created_at")
    updatedAt    DateTime  @updatedAt @map("updated_at")

    user User @relation(fields: [userId], references: [id])

    @@unique([provider, providerUid])
    @@unique([provider, email])
    @@map("auth_identities")
  }

  model Player {
    id          String   @id @default(uuid()) @db.Uuid
    ownerUserId String   @map("owner_user_id") @db.Uuid
    displayName String   @map("display_name")
    avatarUrl   String?  @map("avatar_url")
    handicap    Decimal? @db.Decimal(4, 1)
    isDefault   Boolean  @default(true) @map("is_default")
    status      String   @default("active")
    createdAt   DateTime @default(now()) @map("created_at")
    updatedAt   DateTime @updatedAt @map("updated_at")

    owner User @relation(fields: [ownerUserId], references: [id])

    @@map("players")
  }

  model Session {
    id               String    @id @default(uuid()) @db.Uuid
    userId           String    @map("user_id") @db.Uuid
    refreshTokenHash String    @map("refresh_token_hash")
    userAgent        String?   @map("user_agent")
    ip               String?
    expiresAt        DateTime  @map("expires_at")
    revokedAt        DateTime? @map("revoked_at")
    createdAt        DateTime  @default(now()) @map("created_at")

    user User @relation(fields: [userId], references: [id])

    @@map("sessions")
  }

  关键设计点：
  - AuthIdentity 的 @@unique([provider, email]) 保证 password 下邮箱唯一，但不阻止同一邮箱未来绑微信
  - Player.isDefault 当前阶段每 user 只一个 default，后续靠业务约束放宽
  - Session 表用 refresh_token 的 hash（不存明文），支持单设备吊销

